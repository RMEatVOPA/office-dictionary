<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Office Dictionary</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">

  <style>

body {
  font-family: 'Noto Sans', sans-serif;
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background:
    linear-gradient(135deg, #f3f4f7, #dfe7ef);
  overflow-x: hidden;
}

.background-pattern {
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(0,0,0,0.03) 2px, transparent 2px),
    radial-gradient(circle at 80% 80%, rgba(0,0,0,0.03) 2px, transparent 2px);
  background-size: 80px 80px;
  pointer-events: none;
}

.container {
  width: 90%;
  max-width: 750px;
  text-align: center;
  padding: 40px;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(6px);
  border-radius: 20px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.08);
}

.logo {
  width: 260px;
  max-width: 100%;
  margin-bottom: 10px;
}

h1 {
  font-size: 42px;
  margin-bottom: 25px;
  color: #222;
}

input {
  width: 100%;
  padding: 16px;
  font-size: 18px;
  border-radius: 12px;
  border: 1px solid #ccc;
  box-sizing: border-box;
  outline: none;
  transition: 0.2s;
}

input:focus {
  border-color: #666;
  box-shadow: 0 0 10px rgba(0,0,0,0.08);
}

.result {
  background: white;
  padding: 18px;
  border-radius: 14px;
  margin-top: 18px;
  text-align: left;
  box-shadow: 0 4px 14px rgba(0,0,0,0.05);
}

.term {
  font-weight: 700;
  font-size: 22px;
  margin-bottom: 8px;
  color: #111;
}

.footer {
  margin-top: 30px;
  font-size: 14px;
  color: #666;
}

</style>
</head>

<body>

<div class="background-pattern"></div>

<div class="container">

  <img src="vopa.jpg" alt="VOPA Logo" class="logo">

  <h1>Glossary</h1>

  <input type="text" id="searchBox" placeholder="Search term...">

  <div id="results"></div>

  <div class="footer">
    Curated by RME Department at VOPA
  </div>

</div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRJ3-2I87B0umdAM5LdBvTp40a6lUUzDINjX-aKR0EEEYkK0QDx8ew1D0hD3hNPSDIRwksJWA7lebk6/pub?output=csv";

let dictionary = [];

async function loadSheet() {
  const response = await fetch(sheetURL);
  const text = await response.text();

  const rows = text.split("\n").slice(1);

  dictionary = rows.map(row => {
    const cols = row.split(",");
    return {
      term: cols[0]?.trim(),
      definition: cols[1]?.trim()
    };
  });
}

function searchTerms(query) {
  const resultsDiv = document.getElementById("results");

  resultsDiv.innerHTML = "";

  // Prevent showing all words when box is empty
  if (query.trim() === "") {
    return;
  }

  const filtered = dictionary.filter(item =>
    item.term.toLowerCase().includes(query.toLowerCase())
  );

  filtered.forEach(item => {
    resultsDiv.innerHTML += `
      <div class="result">
        <div class="term">${item.term}</div>
        <div>${item.definition}</div>
      </div>
    `;
  });
}

document.getElementById("searchBox").addEventListener("input", e => {
  searchTerms(e.target.value);
});

loadSheet();
</script>

</body>
</html>
